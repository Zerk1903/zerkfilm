<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>IPTV Editor Pro v2.4 - Vision Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --border: #30363d; --text: #e6edf3; --accent: #58a6ff; --green: #3fb950; --red: #f85149; --yellow: #d29922; }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

        .toolbar{display:flex;gap:8px;padding:10px;background:var(--bg2);border-bottom:1px solid var(--border);align-items:center;z-index:10}
        .btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:0.2s}
        .btn:hover{border-color:var(--accent);background:var(--border)}

        .search-input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 20px; font-size: 12px; outline: none; width: 150px; }

        .main{display:flex;flex:1;overflow:hidden}
        .sidebar{width:240px;border-right:1px solid var(--border);background:var(--bg2);overflow-y:auto}
        .group-item{padding:10px 15px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;border-left:3px solid transparent}
        .group-item.active{background:var(--bg3);border-left-color:var(--accent);color:var(--accent)}

        .content{flex:1;overflow-y:auto;background:var(--bg)}
        .channel-item{display:flex;align-items:center;padding:10px;border-bottom:1px solid var(--border);cursor:pointer}
        .channel-item:hover{background:var(--bg2)}
        .ch-logo{width:40px;height:30px;background:#000;border-radius:4px;margin-right:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid var(--border)}
        .ch-logo img{max-width:100%;max-height:100%}

        .editor-panel{width:420px;border-left:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column}
        .ep-body{padding:20px;overflow-y:auto;flex:1}

        /* Video Container Fix */
        .video-box { width:100%; background:#000; border-radius:8px; margin-bottom:15px; overflow:hidden; border:1px solid var(--border); aspect-ratio: 16/9; position: relative; }
        #videoPlayer { width:100%; height:100%; display:block; object-fit: contain; }

        .field{margin-bottom:12px}
        .field label{display:block;font-size:10px;color:var(--accent);margin-bottom:4px;text-transform:uppercase;font-weight:bold}
        .field input, .field select{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:6px;font-size:12px;outline:none}
        .field input:focus { border-color: var(--accent); }

        .hidden{display:none}
        .statusbar{padding:5px 15px;background:var(--bg2);border-top:1px solid var(--border);font-size:11px;display:flex;justify-content:space-between}
    </style>
</head>
<body>

<div class="toolbar">
    <button class="btn" onclick="importM3UFile()">📁 Dosya</button>
    <button class="btn" onclick="importM3UUrl()">🔗 URL Ekle</button>
    <button class="btn" onclick="clearList()" style="color:var(--red); border-color:rgba(248,81,73,0.3)">🧹 Temizle</button>

    <input type="text" id="searchInput" class="search-input" placeholder="Kanal ara..." oninput="renderChannels()">

    <button class="btn" onclick="setEPGSource()" style="color:var(--yellow)">📡 EPG</button>
    <div style="flex:1"></div>
    <button class="btn" onclick="exportM3U()" style="background:var(--green); color:#000; font-weight:bold">⬇ İndir</button>
</div>

<div class="main">
    <div class="sidebar" id="groupList"></div>
    <div class="content" id="channelList"></div>

    <div class="editor-panel hidden" id="editorPanel">
        <div style="padding:15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center">
            <b>KANAL DÜZENLE & ÖNİZLE</b>
            <span style="cursor:pointer; font-size:18px" onclick="closeEditor()">✕</span>
        </div>
        <div class="ep-body">
            <!-- Video Önizleme Alanı -->
            <div class="video-box">
                <video id="videoPlayer" controls muted></video>
            </div>

            <button class="btn" style="width:100%; margin-bottom:15px; background:var(--accent); color:#000; justify-content:center; font-weight:bold" onclick="testStream()">▶ YAYINI BAŞLAT</button>

            <div class="field"><label>Kanal Adı</label><input type="text" id="ed-name"></div>
            <div class="field"><label>Grup</label><select id="ed-group"></select></div>
            <div class="field"><label>EPG ID (tvg-id)</label><input type="text" id="ed-tvgid"></div>
            <div class="field"><label>Yayın URL</label><input type="text" id="ed-url"></div>
            <div class="field"><label>Logo URL</label><input type="text" id="ed-logo"></div>

            <div style="display:flex; gap:10px; margin-top:15px">
                <button class="btn" style="flex:1; background:var(--green); color:#000; justify-content:center" onclick="saveChanges()">KAYDET</button>
                <button class="btn" style="background:var(--red); justify-content:center" onclick="deleteChannel()">SİL</button>
            </div>
        </div>
    </div>
</div>

<div class="statusbar">
    <div id="stat-left">Kanal: 0</div>
    <div>v2.4 Vision Fix (HLS Support)</div>
</div>

<script>
    let channels = JSON.parse(localStorage.getItem('iptv_data')) || [];
    let groups = JSON.parse(localStorage.getItem('iptv_groups')) || ["Kategorisiz"];
    let activeGroup = "Tümü";
    let editingId = null;
    let hls = null;

    window.onload = () => updateUI();

    function clearList() {
        if(confirm("Tüm listeyi temizlemek istediğine emin misin?")) {
            channels = []; groups = ["Kategorisiz"]; activeGroup = "Tümü";
            localStorage.clear(); updateUI();
        }
    }

    function importM3UUrl() {
        const url = prompt("M3U URL girin:");
        if(url) fetch(url).then(r => r.text()).then(processM3UData).catch(() => alert("CORS Hatası! Link tarayıcı tarafından engellendi."));
    }

    function processM3UData(text) {
        const lines = text.split('\n');
        let name = "", logo = "", group = "Kategorisiz", tvgid = "";
        lines.forEach(line => {
            if (line.startsWith('#EXTINF')) {
                name = (line.match(/,(.*)$/) || [])[1] || "İsimsiz";
                logo = (line.match(/tvg-logo="([^"]*)"/) || [])[1] || "";
                group = (line.match(/group-title="([^"]*)"/) || [])[1] || "Kategorisiz";
                tvgid = (line.match(/tvg-id="([^"]*)"/) || [])[1] || "";
                if(!groups.includes(group)) groups.push(group);
            } else if (line.startsWith('http')) {
                channels.push({ id: Date.now()+Math.random(), name: name.trim(), url: line.trim(), logo, group, tvgid });
            }
        });
        updateUI();
    }

    function updateUI() {
        renderGroups();
        renderChannels();
        localStorage.setItem('iptv_data', JSON.stringify(channels));
        localStorage.setItem('iptv_groups', JSON.stringify(groups));
        document.getElementById('stat-left').innerText = `Kanal: ${channels.length}`;
    }

    function renderChannels() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        let list = channels.filter(c => (activeGroup === "Tümü" || c.group === activeGroup) && c.name.toLowerCase().includes(query));
        document.getElementById('channelList').innerHTML = list.map(c => `
            <div class="channel-item" onclick="openEditor(${c.id})">
                <div class="ch-logo">${c.logo ? `<img src="${c.logo}" onerror="this.src=''">` : '📺'}</div>
                <div>
                    <div style="font-size:13px; font-weight:600">${c.name}</div>
                    <div style="font-size:10px; color:gray">${c.tvgid || 'tvg-id yok'}</div>
                </div>
            </div>`).join('');
    }

    function renderGroups() {
        let html = `<div class="group-item ${activeGroup === 'Tümü'?'active':''}" onclick="setGroup('Tümü')">📋 Tümü <span>${channels.length}</span></div>`;
        groups.forEach(g => {
            const count = channels.filter(c => c.group === g).length;
            html += `<div class="group-item ${activeGroup === g?'active':''}" onclick="setGroup('${g}')">📁 ${g} <span>${count}</span></div>`;
        });
        document.getElementById('groupList').innerHTML = html;
        document.getElementById('ed-group').innerHTML = groups.map(g => `<option value="${g}">${g}</option>`).join('');
    }

    function setGroup(g) { activeGroup = g; updateUI(); }

    function openEditor(id) {
        if(hls) { hls.destroy(); } // Eski yayını kapat
        editingId = id;
        const c = channels.find(x => x.id === id);
        document.getElementById('ed-name').value = c.name;
        document.getElementById('ed-url').value = c.url;
        document.getElementById('ed-logo').value = c.logo || "";
        document.getElementById('ed-group').value = c.group;
        document.getElementById('ed-tvgid').value = c.tvgid || "";
        document.getElementById('editorPanel').classList.remove('hidden');
        // Panel açıldığında videoyu hazırla ama hemen başlatma (kullanıcı butona basınca başlasın)
    }

    // --- VİDEO ÖNİZLEME DÜZELTME ---
    function testStream() {
        const url = document.getElementById('ed-url').value;
        const video = document.getElementById('videoPlayer');

        if (hls) { hls.destroy(); }

        if (url.includes('.m3u8')) {
            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(e => console.log("Otomatik oynatma engellendi, lütfen oynat tuşuna basın."));
                });
                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) { alert("Yayın yüklenemedi: Link hatalı veya CORS engeli var."); }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            }
        } else {
            // Normal mp4 veya direct ts linkleri için
            video.src = url;
            video.play().catch(e => alert("Bu format tarayıcıda doğrudan oynatılamıyor."));
        }
    }

    function saveChanges() {
        const c = channels.find(x => x.id === editingId);
        c.name = document.getElementById('ed-name').value;
        c.url = document.getElementById('ed-url').value;
        c.logo = document.getElementById('ed-logo').value;
        c.group = document.getElementById('ed-group').value;
        c.tvgid = document.getElementById('ed-tvgid').value;
        updateUI();
        alert("Değişiklikler kaydedildi.");
    }

    function closeEditor() {
        if(hls) { hls.destroy(); }
        const video = document.getElementById('videoPlayer');
        video.pause();
        video.src = "";
        document.getElementById('editorPanel').classList.add('hidden');
    }

    function importM3UFile() {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => processM3UData(ev.target.result);
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    }

    function exportM3U() {
        let m3u = "#EXTM3U\n" + channels.map(c => `#EXTINF:-1 tvg-id="${c.tvgid}" tvg-logo="${c.logo}" group-title="${c.group}",${c.name}\n${c.url}`).join('\n');
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([m3u], {type:'text/plain'}));
        a.download = "iptv_vision_fix.m3u"; a.click();
    }

    function deleteChannel() {
        if(confirm("Bu kanalı silmek istediğine emin misin?")) {
            channels = channels.filter(c => c.id !== editingId);
            closeEditor();
            updateUI();
        }
    }
</script>
</body>
</html>
