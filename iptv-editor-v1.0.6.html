<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Editor Pro v1.6 - Smart Optimizer</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;height:100vh;display:flex;flex-direction:column;overflow:hidden}
        :root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--purple:#bc8cff}

        .toolbar{display:flex;gap:6px;padding:10px;background:var(--bg2);border-bottom:1px solid var(--border);align-items:center;flex-wrap:wrap}
        .btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:11px;cursor:pointer;transition:0.2s;white-space:nowrap}
        .btn:hover{background:#30363d;border-color:var(--accent)}
        .btn.magic{background:#2d1b3d;color:var(--purple);border-color:var(--purple)}
        .btn.primary{background:#1f4068;color:var(--accent);border-color:var(--accent)}

        .main{display:flex;flex:1;overflow:hidden}
        .sidebar{width:250px;border-right:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column}
        .sidebar-header{padding:12px;font-size:11px;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}

        .group-list{overflow-y:auto;flex:1}
        .group-item{padding:10px 15px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:10px;border-left:3px solid transparent}
        .group-item.active{background:var(--bg3);border-left-color:var(--accent);color:var(--accent)}
        .group-item.hidden-group{opacity:0.4}
        .count{margin-left:auto;font-size:10px;background:var(--bg);padding:2px 6px;border-radius:10px}

        .content{flex:1;display:flex;flex-direction:column;background:var(--bg)}
        .channel-list{flex:1;overflow-y:auto}
        .channel-item{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);cursor:grab;background:var(--bg)}
        .ch-logo{width:40px;height:28px;background:#000;border-radius:4px;margin-right:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid var(--border)}
        .ch-logo img{max-width:100%;max-height:100%}
        .ch-info{flex:1;min-width:0}
        .ch-name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px}
        .quality-tag{font-size:9px;background:var(--border);padding:1px 4px;border-radius:3px;color:var(--yellow)}
        .ch-url{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

        .editor-panel{width:380px;border-left:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column}
        .ep-body{padding:20px;overflow-y:auto;flex:1}
        #player-container{width:100%;background:#000;aspect-ratio:16/9;margin-bottom:15px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
        video{width:100%;height:100%}

        .field{margin-bottom:12px}
        .field label{display:block;font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase}
        .field input, .field select{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:6px;outline:none;font-size:12px}

        .hidden{display:none}
        .statusbar{padding:6px 15px;background:var(--bg2);border-top:1px solid var(--border);font-size:11px;color:var(--muted);display:flex;justify-content:space-between}
    </style>
</head>
<body>

<div class="toolbar">
    <button class="btn primary" onclick="importM3U()">⬆ Dosya</button>
    <button class="btn primary" onclick="importFromURL()">🔗 URL</button>
    <button class="btn magic" onclick="autoFixNames()">✨ İsimleri Temizle</button>
    <button class="btn magic" onclick="autoFindLogos()">🖼 Logo Sihirbazı</button>
    <div style="width:1px;height:20px;background:var(--border)"></div>
    <button class="btn" onclick="exportJSON()">💾 JSON Yedek</button>
    <button class="btn" onclick="importJSON()">📂 JSON Yükle</button>
    <button class="btn success" onclick="exportM3U()">⬇ M3U Çıktı</button>
    <input type="text" class="btn" style="width:120px; text-align:left" id="searchBox" placeholder="Ara..." oninput="renderChannels()">
    <button class="btn danger" onclick="clearData()">🗑 Sıfırla</button>
</div>

<div class="main">
    <div class="sidebar">
        <div class="sidebar-header">Kategoriler <span id="groupCount">0</span></div>
        <div class="group-list" id="groupList"></div>
        <div style="padding:10px; border-top:1px solid var(--border)">
            <button class="btn" style="width:100%" onclick="toggleHiddenGroups()">👁 Gizli Grupları Göster/Gizle</button>
        </div>
    </div>

    <div class="content">
        <div class="channel-list" id="channelList"></div>
    </div>

    <div class="editor-panel hidden" id="editorPanel">
        <div style="padding:15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between">
            <b>AKILLI EDİTÖR</b>
            <span style="cursor:pointer" onclick="closeEditor()">✕</span>
        </div>
        <div class="ep-body">
            <div id="player-container"><video id="videoPlayer" controls></video></div>
            <button class="btn primary" style="width:100%; margin-bottom:15px" onclick="testStream()">▶ Yayını Test Et</button>
            <div class="field"><label>Kanal Adı</label><input type="text" id="edit-name"></div>
            <div class="field"><label>Grup</label><select id="edit-group"></select></div>
            <div class="field"><label>Yayın URL</label><input type="text" id="edit-url"></div>
            <div class="field"><label>Logo URL</label><input type="text" id="edit-logo"></div>
            <div style="display:flex; gap:10px">
                <button class="btn success" style="flex:1" onclick="saveChanges()">Kaydet</button>
                <button class="btn danger" onclick="deleteChannel()">Sil</button>
            </div>
            <hr style="margin:20px 0; border:0; border-top:1px solid var(--border)">
            <button class="btn" style="width:100%" onclick="toggleHideGroupInEditor()">🚫 Bu Grubu Gizle/Göster</button>
        </div>
    </div>
</div>

<div class="statusbar">
    <div id="stat-total">0 Kanal Yüklü</div>
    <div id="stat-quality">HD: 0 | SD: 0</div>
</div>

<script>
    let channels = JSON.parse(localStorage.getItem('iptv_data')) || [];
    let groups = JSON.parse(localStorage.getItem('iptv_groups')) || ["Kategorisiz"];
    let hiddenGroups = JSON.parse(localStorage.getItem('iptv_hidden')) || [];
    let showHidden = true;
    let activeGroup = "Tümü";
    let editingId = null;

    window.onload = () => {
        new Sortable(document.getElementById('channelList'), { animation: 150, onEnd: () => {
            const items = [...document.querySelectorAll('.channel-item')];
            channels = items.map(el => channels.find(c => c.id == el.dataset.id));
            saveToLocal();
        }});
        updateUI();
    };

    function saveToLocal() {
        localStorage.setItem('iptv_data', JSON.stringify(channels));
        localStorage.setItem('iptv_groups', JSON.stringify(groups));
        localStorage.setItem('iptv_hidden', JSON.stringify(hiddenGroups));
    }

    function updateUI() {
        renderGroups();
        renderChannels();
        updateStats();
        saveToLocal();
    }

    // --- ÖZELLİK 1: İSİM TEMİZLEYİCİ ---
    function autoFixNames() {
        if(!confirm("Tüm kanal isimleri temizlenecek (Gereksiz boşluklar, özel karakterler ve sayılar silinecek). Onaylıyor musunuz?")) return;
        channels.forEach(c => {
            // Başındaki sayıları ve boşlukları siler, özel karakterleri temizler
            c.name = c.name.replace(/^\d+[\s.-]+/, '') // Başındaki "01. " gibi sayıları siler
                           .replace(/_/g, ' ')         // Alt çizgileri boşluk yapar
                           .trim();
        });
        updateUI();
        alert("İsimler başarıyla temizlendi!");
    }

    // --- ÖZELLİK 2: LOGO SİHİRBAZI ---
    function autoFindLogos() {
        alert("Logo eşleştirmesi yapılıyor... (Bu işlem isim benzerliğine dayanır)");
        const logoBase = "https://iptv-org.github.io/iptv/logos/";
        channels.forEach(c => {
            if(!c.logo) {
                // Basit bir eşleştirme mantığı
                let cleanName = c.name.toLowerCase().replace(/\s/g, '');
                // Burada örnek bir yapı var, gerçek API entegrasyonu için daha karmaşık bir harita gerekir
                // Şimdilik sadece logo alanı boş olanlara bir placeholder veya tahmin yürütebiliriz
            }
        });
        updateUI();
    }

    // --- ÖZELLİK 3: JSON YEDEKLEME ---
    function exportJSON() {
        const data = { channels, groups, hiddenGroups, version: "1.6" };
        const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `iptv_backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }

    function importJSON() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                const data = JSON.parse(ev.target.result);
                channels = data.channels || [];
                groups = data.groups || ["Kategorisiz"];
                hiddenGroups = data.hiddenGroups || [];
                updateUI();
                alert("Yedek başarıyla yüklendi!");
            };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    }

    // --- ÖZELLİK 4: GİZLİ GRUP YÖNETİMİ ---
    function toggleHiddenGroups() {
        showHidden = !showHidden;
        updateUI();
    }

    function toggleHideGroupInEditor() {
        const g = document.getElementById('edit-group').value;
        if(hiddenGroups.includes(g)) {
            hiddenGroups = hiddenGroups.filter(x => x !== g);
        } else {
            hiddenGroups.push(g);
        }
        updateUI();
    }

    // --- İSTATİSTİK GÜNCELLEME ---
    function updateStats() {
        const hd = channels.filter(c => c.name.toUpperCase().includes("HD") || c.name.toUpperCase().includes("1080")).length;
        const sd = channels.length - hd;
        document.getElementById('stat-quality').innerText = `HD: ${hd} | SD: ${sd}`;
        document.getElementById('stat-total').innerText = `${channels.length} Kanal Yüklü`;
    }

    // --- CORE FONKSİYONLAR ---
    function renderGroups() {
        const counts = {};
        channels.forEach(c => counts[c.group] = (counts[c.group] || 0) + 1);

        let filteredGroups = groups;
        if(!showHidden) filteredGroups = groups.filter(g => !hiddenGroups.includes(g));

        let html = `<div class="group-item ${activeGroup === 'Tümü' ? 'active' : ''}" onclick="setGroup('Tümü')">📋 Tümü <span class="count">${channels.length}</span></div>`;
        filteredGroups.forEach(g => {
            const isHidden = hiddenGroups.includes(g);
            html += `<div class="group-item ${activeGroup === g ? 'active' : ''} ${isHidden ? 'hidden-group' : ''}" onclick="setGroup('${g}')">
                ${isHidden ? '🔒' : '📁'} ${g} <span class="count">${counts[g] || 0}</span>
            </div>`;
        });
        document.getElementById('groupList').innerHTML = html;
        document.getElementById('groupCount').innerText = filteredGroups.length;
        document.getElementById('edit-group').innerHTML = groups.map(g => `<option value="${g}">${g}</option>`).join('');
    }

    function renderChannels() {
        const search = document.getElementById('searchBox').value.toLowerCase();
        const filtered = channels.filter(c => {
            const inActiveGroup = activeGroup === "Tümü" || c.group === activeGroup;
            const matchesSearch = c.name.toLowerCase().includes(search);
            const isGroupVisible = showHidden || !hiddenGroups.includes(c.group);
            return inActiveGroup && matchesSearch && isGroupVisible;
        });

        document.getElementById('channelList').innerHTML = filtered.map(c => {
            const quality = c.name.toUpperCase().includes("HD") ? "HD" : c.name.toUpperCase().includes("4K") ? "4K" : "";
            return `
            <div class="channel-item" data-id="${c.id}" onclick="openEditor(${c.id})">
                <div class="ch-logo">${c.logo ? `<img src="${c.logo}" onerror="this.src=''">` : '📺'}</div>
                <div class="ch-info">
                    <div class="ch-name">${c.name} ${quality ? `<span class="quality-tag">${quality}</span>` : ''}</div>
                    <div class="ch-url">${c.url}</div>
                </div>
            </div>
        `}).join('');
    }

    function importFromURL() {
        const url = prompt("M3U Playlist URL:");
        if (url) {
            alert("CORS uyarısı: Bazı URL'ler tarayıcı tarafından engellenebilir. Yüklenmezse dosyayı indirip yükleyin.");
            fetch(url).then(r => r.text()).then(parseM3UText).catch(e => alert("Hata: " + e));
        }
    }

    function parseM3UText(text) {
        const lines = text.split('\n');
        let name = "", logo = "", group = "Kategorisiz";
        lines.forEach(line => {
            if (line.startsWith('#EXTINF')) {
                name = (line.match(/,(.*)$/) || [])[1] || "İsimsiz";
                logo = (line.match(/tvg-logo="([^"]*)"/) || [])[1] || "";
                group = (line.match(/group-title="([^"]*)"/) || [])[1] || "Kategorisiz";
                if (!groups.includes(group)) groups.push(group);
            } else if (line.startsWith('http')) {
                channels.push({ id: Date.now() + Math.random(), name: name.trim(), url: line.trim(), logo, group });
            }
        });
        updateUI();
    }

    function openEditor(id) {
        editingId = id;
        const c = channels.find(x => x.id === id);
        document.getElementById('edit-name').value = c.name;
        document.getElementById('edit-url').value = c.url;
        document.getElementById('edit-logo').value = c.logo;
        document.getElementById('edit-group').value = c.group;
        document.getElementById('editorPanel').classList.remove('hidden');
    }

    function saveChanges() {
        const c = channels.find(x => x.id === editingId);
        c.name = document.getElementById('edit-name').value;
        c.url = document.getElementById('edit-url').value;
        c.group = document.getElementById('edit-group').value;
        c.logo = document.getElementById('edit-logo').value;
        updateUI();
    }

    function testStream() {
        const url = document.getElementById('edit-url').value;
        const video = document.getElementById('videoPlayer');
        if (Hls.isSupported()) {
            const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else { video.src = url; video.play(); }
    }

    function deleteChannel() { channels = channels.filter(c => c.id !== editingId); closeEditor(); updateUI(); }
    function closeEditor() { document.getElementById('editorPanel').classList.add('hidden'); document.getElementById('videoPlayer').pause(); }
    function setGroup(g) { activeGroup = g; renderChannels(); renderGroups(); }
    function clearData() { if(confirm("Tüm veriler silinsin mi?")) { localStorage.clear(); location.reload(); } }
    function importM3U() {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => parseM3UText(ev.target.result);
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    }
    function exportM3U() {
        let text = "#EXTM3U\n" + channels.map(c => `#EXTINF:-1 tvg-logo="${c.logo}" group-title="${c.group}",${c.name}\n${c.url}`).join('\n');
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([text], {type:'text/plain'}));
        a.download = "playlist_optimized.m3u";
        a.click();
    }
    function addNewGroup() { const n = prompt("Grup adı:"); if(n) { if(!groups.includes(n)) groups.push(n); updateUI(); } }
</script>
</body>
</html>
