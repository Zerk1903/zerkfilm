<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>IPTV Editor Pro v1.9 - Ultimate Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --border: #30363d; --text: #e6edf3; --accent: #58a6ff; --green: #3fb950; --red: #f85149; --yellow: #d29922; --purple: #bc8cff; }
        .theme-blue { --bg: #0a192f; --bg2: #112240; --bg3: #1b3358; --accent: #64ffda; --text: #ccd6f6; }
        .theme-matrix { --bg: #000; --bg2: #050505; --bg3: #0a0a0a; --accent: #00ff41; --text: #00ff41; --border: #003b00; }

        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

        /* Toolbar */
        .toolbar{display:flex;gap:8px;padding:10px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;z-index:10}
        .btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;font-size:11px;cursor:pointer;transition:0.2s}
        .btn:hover{border-color:var(--accent);background:var(--border)}
        .btn.magic{color:var(--purple);border-color:var(--purple)}
        .btn.epg-btn{color:var(--yellow);border-color:var(--yellow)}

        .main{display:flex;flex:1;overflow:hidden}

        /* Sidebar */
        .sidebar{width:260px;border-right:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column}
        .sidebar-header{padding:12px;font-size:11px;color:var(--accent);text-transform:uppercase;border-bottom:1px solid var(--border);font-weight:bold}
        .group-list{overflow-y:auto;flex:1}
        .group-item{padding:10px 15px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:10px;border-left:3px solid transparent}
        .group-item.active{background:var(--bg3);border-left-color:var(--accent);color:var(--accent)}
        .count{margin-left:auto;font-size:10px;background:var(--bg);padding:2px 6px;border-radius:10px;color:var(--text)}

        /* Content */
        .content{flex:1;overflow-y:auto;background:var(--bg)}
        .channel-item{display:flex;align-items:center;padding:12px;border-bottom:1px solid var(--border);cursor:pointer;transition:0.1s;position:relative}
        .channel-item:hover{background:var(--bg2)}

        .status-dot{width:8px;height:8px;border-radius:50%;margin-right:10px;background:#444}
        .status-online{background:var(--green);box-shadow:0 0 5px var(--green)}
        .status-offline{background:var(--red);box-shadow:0 0 5px var(--red)}

        .fav-star{cursor:pointer;font-size:16px;margin-right:10px;color:var(--bg3)}
        .fav-active{color:gold !important}

        .ch-logo{width:45px;height:32px;background:#000;border-radius:4px;margin-right:12px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);overflow:hidden}
        .ch-logo img{max-width:100%;max-height:100%}

        .ch-info{flex:1;min-width:0}
        .ch-main-row{display:flex;align-items:center;gap:8px}
        .ch-name{font-size:13px;font-weight:600}
        .quality-tag{font-size:9px;background:var(--bg3);padding:1px 4px;border-radius:3px;color:var(--accent);border:1px solid var(--border)}

        /* EPG Style */
        .epg-text{font-size:11px;color:var(--yellow);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .epg-bar-bg{width:100%;height:3px;background:var(--bg3);margin-top:4px;border-radius:2px;overflow:hidden}
        .epg-bar-fill{height:100%;background:var(--green);width:0%}

        /* Editor Panel */
        .editor-panel{width:420px;border-left:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;position:relative}
        .ep-body{padding:20px;overflow-y:auto;flex:1}
        #player-container{width:100%;background:#000;aspect-ratio:16/9;margin-bottom:15px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}

        .field{margin-bottom:12px}
        .field label{display:block;font-size:10px;color:var(--accent);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
        .field input, .field select{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:6px;outline:none;font-size:12px}

        .hidden{display:none}
        .statusbar{padding:6px 15px;background:var(--bg2);border-top:1px solid var(--border);font-size:11px;display:flex;justify-content:space-between;color:var(--text)}
    </style>
</head>
<body>

<div class="toolbar">
    <button class="btn" onclick="importM3U()">⬆ M3U Dosya</button>
    <button class="btn" onclick="importFromURL()">🔗 M3U URL</button>
    <button class="btn epg-btn" onclick="setEPGSource()">📡 EPG Kaynağı</button>
    <div style="width:1px;height:20px;background:var(--border)"></div>
    <button class="btn magic" onclick="autoFixNames()">✨ İsimleri Temizle</button>
    <button class="btn" onclick="checkAllLinks()" style="color:var(--accent)">🔍 Linkleri Denetle</button>
    <select class="btn" onchange="document.body.className=this.value">
        <option value="">Dark Tema</option>
        <option value="theme-blue">Deep Blue</option>
        <option value="theme-matrix">Matrix</option>
    </select>
    <div style="flex:1"></div>
    <button class="btn" onclick="exportJSON()">💾 Yedekle</button>
    <button class="btn success" onclick="exportM3U()">⬇ M3U Çıktı Al</button>
    <button class="btn" onclick="clearData()" style="color:var(--red)">🗑 Sıfırla</button>
</div>

<div class="main">
    <div class="sidebar">
        <div class="sidebar-header">Kategoriler</div>
        <div class="group-list" id="groupList"></div>
    </div>

    <div class="content" id="channelList"></div>

    <div class="editor-panel hidden" id="editorPanel">
        <div style="padding:15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center">
            <b id="panel-title">KANAL EDİTÖRÜ</b>
            <span style="cursor:pointer; font-size:20px" onclick="closeEditor()">✕</span>
        </div>
        <div class="ep-body">
            <div id="player-container"><video id="videoPlayer" controls style="width:100%;height:100%"></video></div>
            <button class="btn" style="width:100%; margin-bottom:15px; background:var(--accent); color:#000; font-weight:bold" onclick="testStream()">▶ YAYINI BAŞLAT</button>

            <div class="field"><label>Kanal Adı</label><input type="text" id="ed-name"></div>
            <div class="field"><label>Grup / Kategori</label><select id="ed-group"></select></div>
            <div class="field"><label>TVG-ID (EPG İÇİN)</label><input type="text" id="ed-tvgid"></div>
            <div class="field"><label>Yayın URL (m3u8/ts)</label><input type="text" id="ed-url"></div>
            <div class="field"><label>Logo URL</label><input type="text" id="ed-logo"></div>

            <div style="display:flex; gap:10px; margin-top:20px">
                <button class="btn" style="flex:1; background:var(--green); color:#000; font-weight:bold" onclick="saveChanges()">KAYDET</button>
                <button class="btn" style="background:var(--red); color:#fff" onclick="deleteChannel()">SİL</button>
            </div>
        </div>
    </div>
</div>

<div class="statusbar">
    <div id="stat-left">Kanal: 0 | Grup: 0</div>
    <div id="stat-right">IPTV Editor Pro v1.9 Ultimate</div>
</div>

<script>
    let channels = JSON.parse(localStorage.getItem('iptv_data')) || [];
    let groups = JSON.parse(localStorage.getItem('iptv_groups')) || ["Kategorisiz"];
    let favorites = JSON.parse(localStorage.getItem('iptv_favs')) || [];
    let epgData = {};
    let activeGroup = "Tümü";
    let editingId = null;

    window.onload = () => {
        initSortable();
        updateUI();
    };

    function updateUI() {
        renderGroups();
        renderChannels();
        saveToLocal();
        updateStats();
    }

    function saveToLocal() {
        localStorage.setItem('iptv_data', JSON.stringify(channels));
        localStorage.setItem('iptv_groups', JSON.stringify(groups));
        localStorage.setItem('iptv_favs', JSON.stringify(favorites));
    }

    // --- RENDER FONKSİYONLARI ---
    function renderGroups() {
        const counts = {};
        channels.forEach(c => counts[c.group] = (counts[c.group] || 0) + 1);

        let html = `<div class="group-item ${activeGroup === 'Tümü' ? 'active' : ''}" onclick="setGroup('Tümü')">📋 Tümü <span class="count">${channels.length}</span></div>`;
        groups.forEach(g => {
            html += `<div class="group-item ${activeGroup === g ? 'active' : ''}" onclick="setGroup('${g}')">📁 ${g} <span class="count">${counts[g] || 0}</span></div>`;
        });
        document.getElementById('groupList').innerHTML = html;
        document.getElementById('ed-group').innerHTML = groups.map(g => `<option value="${g}">${g}</option>`).join('');
    }

    function renderChannels() {
        let list = channels.filter(c => activeGroup === "Tümü" || c.group === activeGroup);

        // Favorileri Üste Al
        list.sort((a, b) => (favorites.includes(b.id) ? 1 : 0) - (favorites.includes(a.id) ? 1 : 0));

        document.getElementById('channelList').innerHTML = list.map(c => {
            const isFav = favorites.includes(c.id);
            const epg = epgData[c.tvgid] || { title: "Yayın bilgisi yok", progress: 0 };
            const quality = c.name.toUpperCase().includes("HD") ? "HD" : c.name.toUpperCase().includes("4K") ? "4K" : "";
            const statusClass = c.status === 'online' ? 'status-online' : c.status === 'offline' ? 'status-offline' : '';

            return `
            <div class="channel-item" data-id="${c.id}" onclick="openEditor(${c.id})">
                <span class="status-dot ${statusClass}"></span>
                <span class="fav-star ${isFav ? 'fav-active' : ''}" onclick="toggleFav(${c.id}, event)">★</span>
                <div class="ch-logo">${c.logo ? `<img src="${c.logo}" onerror="this.src=''">` : '📺'}</div>
                <div class="ch-info">
                    <div class="ch-main-row">
                        <span class="ch-name">${c.name}</span>
                        ${quality ? `<span class="quality-tag">${quality}</span>` : ''}
                    </div>
                    <div class="epg-text">🔴 ${epg.title}</div>
                    <div class="epg-bar-bg"><div class="epg-bar-fill" style="width:${epg.progress}%"></div></div>
                </div>
            </div>`;
        }).join('');
    }

    // --- ÖZELLİKLER ---
    function toggleFav(id, e) {
        e.stopPropagation();
        if(favorites.includes(id)) favorites = favorites.filter(f => f !== id);
        else favorites.push(id);
        updateUI();
    }

    async function checkAllLinks() {
        alert("Bağlantılar denetleniyor... Bu işlem biraz sürebilir.");
        const currentList = channels.filter(c => activeGroup === "Tümü" || c.group === activeGroup);
        for(let c of currentList) {
            try {
                const controller = new AbortController();
                setTimeout(() => controller.abort(), 3000);
                await fetch(c.url, { method: 'HEAD', mode: 'no-cors', signal: controller.signal });
                c.status = 'online';
            } catch (e) { c.status = 'offline'; }
            renderChannels();
        }
    }

    function autoFixNames() {
        if(!confirm("Kanal isimleri temizlensin mi?")) return;
        channels.forEach(c => {
            c.name = c.name.replace(/^\d+[\s.-]+/, '').replace(/_/g, ' ').trim();
        });
        updateUI();
    }

    async function setEPGSource() {
        const url = prompt("XMLTV URL:");
        if(!url) return;
        try {
            const res = await fetch(url);
            const text = await res.text();
            const xml = new DOMParser().parseFromString(text, "text/xml");
            const progs = xml.getElementsByTagName("programme");
            const now = new Date();
            for(let p of progs) {
                const start = parseDate(p.getAttribute("start"));
                const stop = parseDate(p.getAttribute("stop"));
                if(now >= start && now <= stop) {
                    epgData[p.getAttribute("channel")] = {
                        title: p.getElementsByTagName("title")[0].textContent,
                        progress: ((now - start) / (stop - start)) * 100
                    };
                }
            }
            renderChannels();
        } catch(e) { alert("EPG Hatası! CORS engeli olabilir."); }
    }

    function parseDate(s) { return new Date(s.substring(0,4), s.substring(4,6)-1, s.substring(6,8), s.substring(8,10), s.substring(10,12)); }

    // --- CORE ---
    function openEditor(id) {
        editingId = id;
        const c = channels.find(x => x.id === id);
        document.getElementById('ed-name').value = c.name;
        document.getElementById('ed-url').value = c.url;
        document.getElementById('ed-logo').value = c.logo || "";
        document.getElementById('ed-group').value = c.group;
        document.getElementById('ed-tvgid').value = c.tvgid || "";
        document.getElementById('editorPanel').classList.remove('hidden');
    }

    function saveChanges() {
        const c = channels.find(x => x.id === editingId);
        c.name = document.getElementById('ed-name').value;
        c.url = document.getElementById('ed-url').value;
        c.logo = document.getElementById('ed-logo').value;
        c.group = document.getElementById('ed-group').value;
        c.tvgid = document.getElementById('ed-tvgid').value;
        updateUI();
        alert("Güncellendi!");
    }

    function testStream() {
        const url = document.getElementById('ed-url').value;
        const video = document.getElementById('videoPlayer');
        if(Hls.isSupported()) {
            const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else { video.src = url; video.play(); }
    }

    function importM3U() {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                const lines = ev.target.result.split('\n');
                let name = "", logo = "", group = "Kategorisiz", tvgid = "";
                lines.forEach(line => {
                    if (line.startsWith('#EXTINF')) {
                        name = (line.match(/,(.*)$/) || [])[1] || "İsimsiz";
                        logo = (line.match(/tvg-logo="([^"]*)"/) || [])[1] || "";
                        group = (line.match(/group-title="([^"]*)"/) || [])[1] || "Kategorisiz";
                        tvgid = (line.match(/tvg-id="([^"]*)"/) || [])[1] || "";
                        if(!groups.includes(group)) groups.push(group);
                    } else if (line.startsWith('http')) {
                        channels.push({ id: Date.now()+Math.random(), name: name.trim(), url: line.trim(), logo, group, tvgid, status: 'unknown' });
                    }
                });
                updateUI();
            };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    }

    function exportM3U() {
        let m3u = "#EXTM3U\n" + channels.map(c => `#EXTINF:-1 tvg-id="${c.tvgid}" tvg-logo="${c.logo}" group-title="${c.group}",${c.name}\n${c.url}`).join('\n');
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([m3u], {type:'text/plain'}));
        a.download = "ultimate_playlist.m3u"; a.click();
    }

    function setGroup(g) {
        if(g === "Özel") { if(prompt("PIN:") !== "1234") return; }
        activeGroup = g; updateUI();
    }

    function initSortable() {
        new Sortable(document.getElementById('channelList'), { animation: 150, onEnd: () => {
            const items = [...document.querySelectorAll('.channel-item')];
            channels = items.map(el => channels.find(c => c.id == el.dataset.id));
            saveToLocal();
        }});
    }

    function deleteChannel() { channels = channels.filter(c => c.id !== editingId); closeEditor(); updateUI(); }
    function closeEditor() { document.getElementById('editorPanel').classList.add('hidden'); document.getElementById('videoPlayer').pause(); }
    function updateStats() { document.getElementById('stat-left').innerText = `Kanal: ${channels.length} | Grup: ${groups.length}`; }
    function clearData() { if(confirm("Tüm veriler silinsin mi?")) { localStorage.clear(); location.reload(); } }
    function exportJSON() {
        const blob = new Blob([JSON.stringify({channels, groups, favorites})], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "iptv_backup.json"; a.click();
    }
</script>
</body>
</html>
